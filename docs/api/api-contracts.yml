openapi: 3.1.0
info:
    title: K24 API Contracts
    version: 1.0.0
servers:
paths:
    /api/users:
        get:
            summary: Fetch users list
            description: Returns a list of all users, or a filtered list by specified parameters
            parameters:
              - name: user_id
                in: query
                description: Unique, permanent ID of a user
                required: false
                schema:
                    type: integer
              - name: role
                in: query
                description: User's role in the system
                required: false
                schema:
                    type: string
            responses:
                '200':
                    summary: Sucessfully fetched list of users
                    description: List of users
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        user_id:
                                            type: integer
                                        role:
                                            type: string
                '500':
                    description: Failed to return users list
        post:
            summary: Create new user
            description: Creates a new user from role, assigns an ID and returns user
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                              - role
                            properties:
                                role:
                                    type: string
            responses:
                '201':
                    summary: Successfully created user
                    description: Created user
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    user_id:
                                        type: integer
                                    role:
                                        type: string
                '400':
                    summary: Failed to create user; invalid role?
                    description: Failed to create user; invalid role?
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        description: Error message
                '500':
                    description: Server failed to create user
    /api/tasks:
        get:
            summary: Fetch tasks list
            description: Returns a list of all tasks
            responses:
                '200':
                    summary: Sucessfully fetched tasks
                    description: List of tasks
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        task_id:
                                            type: integer
                                            description: Unique permanent ID of task
                                        assignee:
                                            type: integer
                                            description: Assignee's user_id
                                        status:
                                            type: string
                                            enum:
                                              - todo
                                              - in_progress
                                              - review
                                              - done
                '500':
                    description: Failed to return tasks list
        post:
            summary: Create new task
            description: Creates new task with given assignee id, estimate hours to finish and due date in unix seconds
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                              - assignee
                              - estimate_h
                              - due_date
                            properties:
                                assignee:
                                    type: integer
                                    description: Assignee's user_id
                                estimate_h:
                                    type: integer
                                    description: Estimate whole hours of work to finish this task left
                                due_date:
                                    type: integer
                                    description: Unix seconds timestamp by which the task is due
            responses:
                '201':
                    summary: Successfully created task
                    description: Successfully created task
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    task_id:
                                        type: integer
                                        description: Unique permanent ID of task
                                    assignee:
                                        type: integer
                                        description: Assignee's user_id
                                    status:
                                        type: string
                                        enum:
                                          - todo
                                          - in_progress
                                          - review
                                          - done
                                    estimate_h:
                                        type: integer
                                        description: Estimate whole hours of work to finish this task left
                                    created_at:
                                        type: integer
                                        description: Unix seconds timestamp at which the task was created
                                    due_date:
                                        type: integer
                                        description: Unix seconds timestamp by which the task is due
                '400':
                    summary: Failed to create task; invalid parameters?
                    description: Failed to create task; invalid parameters?
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    error:
                                        type: string
                                        description: Error message
    /api/time_logs:
        get:
            summary: Fetch time_logs
            description: Returns all time_logs
            responses:
                '200':
                    summary: Time logs
                    description: Time logs of when a tasks's estimate_h was updated
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        task_id:
                                            type: integer
                                            description: Unique permanent ID of task
                                        user_id:
                                            type: integer
                                            description: user_id of person assigned to task
                                        date:
                                            type: integer
                                            description: Unix seconds timestamp at which estimate_h was updated
                                        estimate_h:
                                            type: integer
                                            description: Estimate whole hours of work to finish this task left
                                            